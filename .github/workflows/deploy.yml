name: Deploy BMI System

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Deploy Unified API Worker ────────────────────────────────────────────────
  deploy-api:
    name: Deploy API Worker
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies (workspace)
        run: npm install
        working-directory: .

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: deploy

  # ─── Deploy Portal Frontend ───────────────────────────────────────────────────
  deploy-portal:
    name: Deploy Portal (Cloudflare Pages)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    defaults:
      run:
        working-directory: apps/portal
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies (workspace)
        run: npm install
        working-directory: .

      - name: Build portal
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/portal
          command: pages deploy dist --project-name=bmi-portal

  # ─── Deploy UMS Frontend ──────────────────────────────────────────────────────
  deploy-ums:
    name: Deploy UMS (Cloudflare Pages)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    defaults:
      run:
        working-directory: apps/ums
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies (workspace)
        run: npm install
        working-directory: .

      - name: Build UMS
        run: npm run build
        env:
          NODE_ENV: production
          VITE_API_URL: ${{ secrets.UMS_API_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/ums
          command: pages deploy dist --project-name=bmi-ums

  # ─── Run Tests (PRs only) ─────────────────────────────────────────────────────
  test:
    name: Type Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install all workspace dependencies
        run: npm install

      - name: Type check shared package
        run: npm run typecheck
        working-directory: packages/shared
        continue-on-error: true

      - name: Type check UMS frontend
        run: npm run type-check
        working-directory: apps/ums
        continue-on-error: true

      - name: Run UMS tests
        run: npm test
        working-directory: apps/ums
        continue-on-error: true
