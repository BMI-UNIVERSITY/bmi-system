name: Deploy BMI System

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Deploy Unified API Worker ────────────────────────────────────────────────
  deploy-api:
    name: Deploy API Worker
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && needs.test.outputs.api == 'true'
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies (workspace)
        run: |
          npm ci
        working-directory: .

      - name: Inject Cloudflare IDs
        run: |
          sed -i 's/${CLOUDFLARE_D1_ID}/'${{ secrets.CLOUDFLARE_D1_ID }}'/g' wrangler.jsonc

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: deploy

  # ─── Deploy Portal Frontend ───────────────────────────────────────────────────
  deploy-portal:
    name: Deploy Portal (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && needs.test.outputs.portal == 'true'
    defaults:
      run:
        working-directory: apps/portal
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies (workspace)
        run: |
          npm ci
        working-directory: .

      - name: Build portal
        run: npm run build
        env:
          NODE_ENV: production
          VITE_API_URL: ${{ secrets.UMS_API_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/portal
          command: pages deploy dist --project-name=bmi-portal

  # ─── Deploy UMS Frontend ──────────────────────────────────────────────────────
  deploy-ums:
    name: Deploy UMS (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && needs.test.outputs.ums == 'true'
    defaults:
      run:
        working-directory: apps/ums
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies (workspace)
        run: |
          npm ci
        working-directory: .

      - name: Build UMS
        run: npm run build
        env:
          NODE_ENV: production
          VITE_API_URL: ${{ secrets.UMS_API_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/ums
          command: pages deploy dist --project-name=bmi-ums

  # ─── Run Tests (PRs only) ─────────────────────────────────────────────────────
  test:
    name: Type Check & Test
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      portal: ${{ steps.filter.outputs.portal }}
      ums: ${{ steps.filter.outputs.ums }}
    steps:
      - uses: actions/checkout@v4

      - name: Path Filters
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/shared/**'
            portal:
              - 'apps/portal/**'
              - 'packages/shared/**'
            ums:
              - 'apps/ums/**'
              - 'packages/shared/**'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install all workspace dependencies
        run: |
          npm ci

      - name: Type check shared package
        run: npm run typecheck
        working-directory: packages/shared

      - name: Type check UMS frontend
        run: npm run type-check
        working-directory: apps/ums

      - name: Run UMS tests
        run: npm test
        working-directory: apps/ums

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        working-directory: apps/ums

      - name: Run UMS E2E tests
        run: npm run test:e2e
        working-directory: apps/ums

      - name: Run npm audit
        run: npm audit --audit-level=high || true
