name: Deploy BMI System

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # E2E tests run weekly on Monday

jobs:
  # ─── Detect Changes ───────────────────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      portal: ${{ steps.filter.outputs.portal }}
      ums: ${{ steps.filter.outputs.ums }}
      university: ${{ steps.filter.outputs.university }}
    steps:
      - uses: actions/checkout@v4
      - name: Path Filters
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/**'
              - 'package-lock.json'
              - 'package.json'
              - '.github/workflows/deploy.yml'
            portal:
              - 'apps/portal/**'
              - 'packages/shared/**'
              - 'package-lock.json'
              - 'package.json'
              - '.github/workflows/deploy.yml'
            ums:
              - 'apps/ums/**'
              - 'packages/shared/**'
              - 'package-lock.json'
              - 'package.json'
              - '.github/workflows/deploy.yml'
            university:
              - 'bmi-university/**'
              - 'packages/shared/**'
              - 'package-lock.json'
              - 'package.json'
              - '.github/workflows/deploy.yml'

  # ─── Turbo Cache Key ──────────────────────────────────────────────────────────
  turbo-cache:
    name: Turbo Cache Setup
    runs-on: ubuntu-latest
    outputs:
      key: ${{ steps.cache.outputs.cache-hit }}
    steps:
      - id: cache
        uses: actions/cache@v4
        with:
          path: node_modules/.cache/turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('package-lock.json', 'turbo.json') }}
          restore-keys: |
            turbo-${{ runner.os }}-

  # ─── Test API ─────────────────────────────────────────────────────────────────
  test-api:
    name: Type Check & Test API
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.api == 'true'
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Restore Turbo cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules/.cache/turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('package-lock.json', 'turbo.json') }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Build dependencies with turbo
        run: npm run ci:build -- --filter=@bmi/api...
        working-directory: .

      - name: Verify D1 Migrations
        run: npm run verify-migrations

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Run tests (includes contract tests)
        run: npm test

      - name: Save Turbo cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: node_modules/.cache/turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('package-lock.json', 'turbo.json') }}

  # ─── Test UMS Frontend ───────────────────────────────────────────────────────
  test-ums:
    name: Type Check & Test UMS
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ums == 'true'
    defaults:
      run:
        working-directory: apps/ums
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Restore Turbo cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules/.cache/turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('package-lock.json', 'turbo.json') }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Build dependencies with turbo
        run: npm run ci:build -- --filter=@bmi/ums...
        working-directory: .

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Save Turbo cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: node_modules/.cache/turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('package-lock.json', 'turbo.json') }}

  # ─── Test University Frontend (Next.js) ──────────────────────────────────────
  test-university:
    name: Type Check & Test University
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.university == 'true'
    defaults:
      run:
        working-directory: bmi-university
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Restore Turbo cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules/.cache/turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('package-lock.json', 'turbo.json') }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Build with turbo
        run: npm run ci:build -- --filter=bmi-university
        working-directory: .

      - name: Run tests
        run: npm test

      - name: Save Turbo cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: node_modules/.cache/turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('package-lock.json', 'turbo.json') }}

  # ─── E2E Tests (Weekly Schedule Only) ────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    defaults:
      run:
        working-directory: apps/ums
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npm run test:e2e

  # ─── Deploy Unified API Worker ────────────────────────────────────────────────
  deploy-api:
    name: Deploy API Worker
    runs-on: ubuntu-latest
    needs: [changes, test-api]
    if: github.event_name == 'push' && needs.changes.outputs.api == 'true'
    environment:
      name: production
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Build dependencies with turbo
        run: npm run ci:build -- --filter=@bmi/api...
        working-directory: .

      - name: Inject Cloudflare IDs
        run: |
          sed -i 's/${CLOUDFLARE_D1_ID}/'${{ secrets.CLOUDFLARE_D1_ID }}'/g' wrangler.jsonc

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: deploy

  # ─── Deploy Portal Frontend ───────────────────────────────────────────────────
  deploy-portal:
    name: Deploy Portal (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: [changes, test-api]
    if: github.event_name == 'push' && needs.changes.outputs.portal == 'true'
    defaults:
      run:
        working-directory: apps/portal
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Build portal
        run: npm run build
        env:
          NODE_ENV: production
          VITE_API_URL: "https://bmi-api.bmiuniversity107.workers.dev"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/portal
          command: pages deploy dist --project-name=bmi-portal

  # ─── Deploy UMS Frontend ──────────────────────────────────────────────────────
  deploy-ums:
    name: Deploy UMS (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: [changes, test-ums]
    if: github.event_name == 'push' && needs.changes.outputs.ums == 'true'
    defaults:
      run:
        working-directory: apps/ums
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Build UMS
        run: npm run build
        env:
          NODE_ENV: production
          VITE_API_URL: "https://bmi-api.bmiuniversity107.workers.dev"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/ums
          command: pages deploy dist --project-name=bmi-ums

  # ─── Deploy University Frontend ───────────────────────────────────────────────
  deploy-university:
    name: Deploy University (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: [changes, test-university]
    if: github.event_name == 'push' && needs.changes.outputs.university == 'true'
    defaults:
      run:
        working-directory: bmi-university
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Build University
        run: npm run build

      - name: Verify build output
        run: |
          echo "=== Checking out/ directory exists ==="
          ls -la out/
          echo "=== Verifying new footer content in index.html ==="
          grep -c "Subscribe" out/index.html && echo "✅ Newsletter section found" || echo "❌ Newsletter section NOT found"
          grep -c "programCategories\|Quick Links\|font-sans" out/index.html && echo "✅ New footer classes found" || echo "❌ New footer classes NOT found"
          echo "=== Footer tail snippet ==="
          grep -o "Privacy Policy.*Terms of Service" out/index.html | head -1 || echo "(pattern not found)"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: bmi-university
          command: pages deploy out --project-name=bmi-university --branch=main
