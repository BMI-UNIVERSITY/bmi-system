name: Deploy BMI System

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Detect Changes ───────────────────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      portal: ${{ steps.filter.outputs.portal }}
      ums: ${{ steps.filter.outputs.ums }}
      university: ${{ steps.filter.outputs.university }}
    steps:
      - uses: actions/checkout@v4
      - name: Path Filters
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/shared/**'
              - 'package-lock.json'
              - 'package.json'
              - '.github/workflows/deploy.yml'
            portal:
              - 'apps/portal/**'
              - 'packages/shared/**'
              - 'package-lock.json'
              - 'package.json'
              - '.github/workflows/deploy.yml'
            ums:
              - 'apps/ums/**'
              - 'packages/shared/**'
              - 'package-lock.json'
              - 'package.json'
              - '.github/workflows/deploy.yml'
            university:
              - 'bmi-university/**'
              - 'packages/shared/**'
              - 'package-lock.json'
              - 'package.json'
              - '.github/workflows/deploy.yml'

  # ─── Deploy Unified API Worker ────────────────────────────────────────────────
  deploy-api:
    name: Deploy API Worker
    runs-on: ubuntu-latest
    needs: [changes, test, contract-tests]
    if: github.event_name == 'push' && needs.changes.outputs.api == 'true'
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies (workspace)
        run: |
          npm ci
        working-directory: .

      - name: Inject Cloudflare IDs
        run: |
          sed -i 's/${CLOUDFLARE_D1_ID}/'${{ secrets.CLOUDFLARE_D1_ID }}'/g' wrangler.jsonc

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: deploy

  # ─── Deploy Portal Frontend ───────────────────────────────────────────────────
  deploy-portal:
    name: Deploy Portal (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: [changes, test, contract-tests]
    if: github.event_name == 'push' && needs.changes.outputs.portal == 'true'
    defaults:
      run:
        working-directory: apps/portal
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies (workspace)
        run: |
          npm ci
        working-directory: .

      - name: Build portal
        run: npm run build
        env:
          NODE_ENV: production
          VITE_API_URL: "https://bmi-api.bmiuniversity107.workers.dev"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/portal
          command: pages deploy dist --project-name=bmi-portal

  # ─── Deploy UMS Frontend ──────────────────────────────────────────────────────
  deploy-ums:
    name: Deploy UMS (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: [changes, test, contract-tests]
    if: github.event_name == 'push' && needs.changes.outputs.ums == 'true'
    defaults:
      run:
        working-directory: apps/ums
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies (workspace)
        run: |
          npm ci
        working-directory: .

      - name: Build UMS
        run: npm run build
        env:
          NODE_ENV: production
          VITE_API_URL: "https://bmi-api.bmiuniversity107.workers.dev"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/ums
          command: pages deploy dist --project-name=bmi-ums

  # ─── Deploy University Frontend ───────────────────────────────────────────────
  deploy-university:
    name: Deploy University (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: [changes, test, contract-tests]
    if: github.event_name == 'push' && needs.changes.outputs.university == 'true'
    defaults:
      run:
        working-directory: bmi-university
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies (workspace)
        run: |
          npm ci
        working-directory: .

      - name: Build University
        run: npm run build

      - name: Verify build output
        run: |
          echo "=== Checking out/ directory exists ==="
          ls -la out/
          echo "=== Verifying new footer content in index.html ==="
          grep -c "Subscribe" out/index.html && echo "✅ Newsletter section found" || echo "❌ Newsletter section NOT found"
          grep -c "programCategories\|Quick Links\|font-sans" out/index.html && echo "✅ New footer classes found" || echo "❌ New footer classes NOT found"
          echo "=== Footer tail snippet ==="
          grep -o "Privacy Policy.*Terms of Service" out/index.html | head -1 || echo "(pattern not found)"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: bmi-university
          command: pages deploy out --project-name=bmi-university --branch=main

  # ─── Run Tests (PRs & Background) ─────────────────────────────────────────────
  test:
    name: Type Check & Test
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install all workspace dependencies
        run: |
          npm ci

      - name: Type check shared package
        run: npm run typecheck
        working-directory: packages/shared

      - name: Verify D1 Migrations
        run: npm run verify-migrations
        working-directory: apps/api

      - name: Type check API
        run: npm run type-check
        working-directory: apps/api

      - name: Run API tests (includes contract tests)
        run: npm test
        working-directory: apps/api

      - name: Type check UMS frontend
        run: npm run type-check
        working-directory: apps/ums

      - name: Run UMS tests
        run: npm test
        working-directory: apps/ums

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        working-directory: apps/ums

      - name: Run UMS E2E tests
        run: npm run test:e2e
        working-directory: apps/ums

  # ─── API Contract Tests (blocking gate) ──────────────────────────────────────
  contract-tests:
    name: API Contract Tests
    runs-on: ubuntu-latest
    needs: changes
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install all workspace dependencies
        run: npm ci
        working-directory: .

      - name: Run API contract tests
        # Contract tests are NOT continue-on-error — they are a hard gate.
        # Any regression in the { success, data: { items, page, perPage, total } }
        # response envelope will fail this job and block deployment.
        run: npm test

