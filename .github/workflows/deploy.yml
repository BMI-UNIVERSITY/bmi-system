name: Deploy BMI System

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # E2E tests run weekly on Monday

# Cancel in-progress runs on same branch to avoid queue pileup
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'
  TURBO_TEAM: bmi
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  # ─── Detect Changes ───────────────────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      portal: ${{ steps.filter.outputs.portal }}
      ums: ${{ steps.filter.outputs.ums }}
      university: ${{ steps.filter.outputs.university }}
      any: ${{ steps.filter.outputs.api == 'true' || steps.filter.outputs.portal == 'true' || steps.filter.outputs.ums == 'true' || steps.filter.outputs.university == 'true' }}
    steps:
      - uses: actions/checkout@v7

      - name: Path Filters
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - '.github/workflows/deploy.yml'
            portal:
              - 'apps/portal/**'
              - 'packages/shared/**'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - '.github/workflows/deploy.yml'
            ums:
              - 'apps/ums/**'
              - 'packages/shared/**'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - '.github/workflows/deploy.yml'
            university:
              - 'bmi-university/**'
              - 'packages/shared/**'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - '.github/workflows/deploy.yml'

  # ─── CI Checks (Type-Check + Lint + Test + Build, all in one Turbo run) ───────
  # Turbo parallelises tasks across all CPU cores and uses its content-hash
  # cache so unchanged packages are replayed from cache, not rebuilt.
  ci-checks:
    name: CI Checks (Turbo)
    runs-on: ubuntu-latest
    needs: changes
    if: >
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.portal == 'true' ||
      needs.changes.outputs.ums == 'true' ||
      needs.changes.outputs.university == 'true'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2 # Turbo needs HEAD^ to compute affected packages

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      # Populate node_modules from cache (speeds up pnpm install --frozen-lockfile by restoring
      # previously-installed packages).  pnpm install --frozen-lockfile always runs — stale caches
      # are repaired automatically.  The setup-node global npm cache makes
      # subsequent pnpm install --frozen-lockfile runs fast even on a cold node_modules directory.
      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      # Restore Turborepo local filesystem cache so already-built packages
      # are replayed instantly without re-running their tasks.
      - name: Restore Turborepo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      # Single Turbo command — Turbo fans out all tasks in topological order,
      # parallelises within each layer and skips packages with cache hits.
      - name: Run CI (build + lint + typecheck + test)
        run: pnpm exec turbo run build lint type-check test --concurrency=100%

      # Persist the Turbo cache so deploy jobs (and future CI runs) can hit it.
      - name: Save Turborepo cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}

  # ─── E2E Tests (Weekly Schedule Only) ────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Install Playwright Browsers
        working-directory: apps/ums
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: apps/ums
        run: pnpm run test:e2e

  # ─── Deploy Unified API Worker ────────────────────────────────────────────────
  deploy-api:
    name: Deploy API Worker
    runs-on: ubuntu-latest
    needs: [changes, ci-checks]
    if: github.event_name == 'push' && needs.changes.outputs.api == 'true'
    environment:
      name: production
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: nm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      # Restore Turborepo cache — build artifacts from ci-checks are replayed
      # immediately, meaning this build step finishes in ~1 second on a hit.
      - name: Restore Turborepo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Build API (from Turbo cache)
        run: pnpm exec turbo run build --filter=@bmi/api --concurrency=100%

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: deploy

  # ─── Deploy Portal Frontend ───────────────────────────────────────────────────
  deploy-portal:
    name: Deploy Portal (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: [changes, ci-checks]
    if: github.event_name == 'push' && needs.changes.outputs.portal == 'true'
    environment:
      name: production
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: nm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Restore Turborepo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Build Portal (from Turbo cache)
        run: pnpm exec turbo run build --filter=bmi-portal --concurrency=100%
        env:
          NODE_ENV: production
          VITE_API_URL: "https://bmi-api.bmiuniversity107.workers.dev"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/portal
          command: pages deploy dist --project-name=bmi-portal

  # ─── Deploy UMS Frontend ──────────────────────────────────────────────────────
  deploy-ums:
    name: Deploy UMS (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: [changes, ci-checks]
    if: github.event_name == 'push' && needs.changes.outputs.ums == 'true'
    environment:
      name: production
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: nm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Restore Turborepo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Build UMS (from Turbo cache)
        run: pnpm exec turbo run build --filter=bmi-ums-frontend --concurrency=100%
        env:
          NODE_ENV: production
          VITE_API_URL: "https://bmi-api.bmiuniversity107.workers.dev"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/ums
          command: pages deploy dist --project-name=bmi-ums

  # ─── Deploy University Frontend ───────────────────────────────────────────────
  deploy-university:
    name: Deploy University (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: [changes, ci-checks]
    if: github.event_name == 'push' && needs.changes.outputs.university == 'true'
    environment:
      name: production
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: nm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Restore Turborepo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Build University (from Turbo cache)
        run: pnpm exec turbo run build --filter=bmi-university --concurrency=100%

      - name: Verify build output
        run: |
          echo "=== Checking out/ directory exists ==="
          ls -la bmi-university/out/
          echo "=== Verifying key assets exist ==="
          test -f bmi-university/out/index.html && echo "✅ index.html found" || echo "❌ index.html NOT found"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: bmi-university
          command: pages deploy out --project-name=bmi-university --branch=main

