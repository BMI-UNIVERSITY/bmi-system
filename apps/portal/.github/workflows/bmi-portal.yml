name: Build and Test BMI Portal

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout shared package
        uses: actions/checkout@v4
        with:
          repository: BMI-UNIVERSITY/bmi-shared
          path: temp-shared

      - name: Move shared package to parent directory
        run: |
          mkdir -p ../packages
          mv temp-shared ../packages/bmi-shared

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test -- --run

      - name: Build project
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Checkout shared package
        uses: actions/checkout@v4
        with:
          repository: BMI-UNIVERSITY/bmi-shared
          path: temp-shared

      - name: Move shared package to parent directory
        run: |
          mkdir -p ../packages
          mv temp-shared ../packages/bmi-shared

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 2557f2f143734abc82bd4c80be750eb6
