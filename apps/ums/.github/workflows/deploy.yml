name: Deploy to Production

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

# Never run two deploys at the same time. Never cancel an in-flight deploy.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH Deploy → Smoke Test → Rollback on failure
    runs-on: ubuntu-latest
    # Only deploy when CI passed — not on cancel or failure
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production

    steps:
      # ── 1. Checkout (for commit SHA reference) ──────────────────────────────
      - uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v4

      # ── 2. Install SSH private key ────────────────────────────────────────────
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: unnecessary
          if_key_exists: replace

      # ── 3. Trust the server (prevents MITM prompt) ────────────────────────────
      - name: Add known host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      # ── 4. Deploy ────────────────────────────────────────────────────────────
      # Best practices applied:
      #   • Pass all values as positional args — env vars don't cross SSH boundaries
      #   • `docker compose down` before `up` — forces full container recreation
      #     so updated volume-mounted files (migrations, hooks) are always picked up
      #   • Sequential builds — prevents OOM on 1 GB Oracle free-tier VMs
      #   • 2 GB swap file — allows npm ci / vite build to overflow to disk safely
      #   • `--no-build` on `up` — build is explicit and separate for clarity
      #   • Capture rollback digest BEFORE touching anything
      - name: Deploy on server
        id: deploy
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.SSH_DEPLOY_PATH }}
          GITHUB_SHA: ${{ github.sha }}
          LITESTREAM_S3_BUCKET: ${{ secrets.LITESTREAM_S3_BUCKET }}
          LITESTREAM_ACCESS_KEY_ID: ${{ secrets.LITESTREAM_ACCESS_KEY_ID }}
          LITESTREAM_SECRET_ACCESS_KEY: ${{ secrets.LITESTREAM_SECRET_ACCESS_KEY }}
          LITESTREAM_ENDPOINT: ${{ secrets.LITESTREAM_ENDPOINT }}
        run: |
          ssh "$SSH_USER@$SSH_HOST" bash -s \
            "$DEPLOY_PATH" \
            "$GITHUB_SHA" \
            "$LITESTREAM_S3_BUCKET" \
            "$LITESTREAM_ACCESS_KEY_ID" \
            "$LITESTREAM_SECRET_ACCESS_KEY" \
            "$LITESTREAM_ENDPOINT" << 'ENDSSH'
            set -euo pipefail
            DEPLOY_PATH=$1
            DEPLOY_SHA=$2
            LITESTREAM_S3_BUCKET=$3
            LITESTREAM_ACCESS_KEY_ID=$4
            LITESTREAM_SECRET_ACCESS_KEY=$5
            LITESTREAM_ENDPOINT=$6
            COMPOSE="docker compose -f docker-compose.oracle.yml"

            cd "$DEPLOY_PATH"

            # ── Inject Litestream credentials into .env ────────────────────────
            # Uses sed to update-or-append each key so the file stays consistent
            echo "==> Updating Litestream credentials in .env..."
            for kv in \
              "LITESTREAM_S3_BUCKET=${LITESTREAM_S3_BUCKET}" \
              "LITESTREAM_ACCESS_KEY_ID=${LITESTREAM_ACCESS_KEY_ID}" \
              "LITESTREAM_SECRET_ACCESS_KEY=${LITESTREAM_SECRET_ACCESS_KEY}" \
              "LITESTREAM_ENDPOINT=${LITESTREAM_ENDPOINT}"; do
              key="${kv%%=*}"
              val="${kv#*=}"
              if grep -q "^${key}=" .env 2>/dev/null; then
                sed -i "s|^${key}=.*|${key}=${val}|" .env
              else
                echo "${key}=${val}" >> .env
              fi
            done

            # ── Capture rollback point BEFORE any changes ──────────────────────
            echo "==> Saving rollback point..."
            PREV_SHA=$(git rev-parse HEAD 2>/dev/null || echo "none")
            echo "Previous SHA: $PREV_SHA"

            # ── Pull latest code ───────────────────────────────────────────────
            echo "==> Pulling code for SHA: $DEPLOY_SHA"
            git fetch --all --prune
            git reset --hard origin/main

            # ── Ensure swap space (prevents OOM on 1GB Oracle free-tier) ───────
            echo "==> Checking swap..."
            if ! swapon --show | grep -q '/swapfile'; then
              echo "    Creating 2 GB swap file..."
              sudo fallocate -l 2G /swapfile 2>/dev/null \
                || sudo dd if=/dev/zero of=/swapfile bs=1M count=2048 status=progress
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
              echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
              echo "    Swap created."
            else
              echo "    Swap already active."
            fi

            # ── Pull pre-built images that we don't build locally ──────────────
            echo "==> Pulling base images..."
            $COMPOSE pull --quiet pocketbase litestream caddy

            # ── Build application images ONE AT A TIME to stay within RAM ──────
            echo "==> Building API image..."
            NODE_OPTIONS="--max-old-space-size=512" $COMPOSE build --no-cache api

            # ── CRITICAL: Tear down ALL containers before starting ─────────────
            # This is the key step that was missing. Without `down`, Docker keeps
            # the old crashed container and just tries to restart it — meaning
            # updated volume-mounted files like pb_migrations/*.js are NEVER read
            # by a fresh process. `down` preserves named volumes (pb_data stays),
            # but recreates every container from scratch.
            echo "==> Stopping and removing all containers (preserving data volumes)..."
            $COMPOSE down --remove-orphans --timeout 30 || true

            # ── Start everything fresh ─────────────────────────────────────────
            echo "==> Starting all services fresh..."
            if ! $COMPOSE up -d --no-build; then
              echo ""
              echo "════════════════════════════════════════════"
              echo "  STARTUP FAILED — container logs follow:"
              echo "════════════════════════════════════════════"
              echo ""
              echo "── PocketBase logs (last 100 lines) ──"
              $COMPOSE logs pocketbase --tail 100 || true
              echo ""
              echo "── API logs (last 30 lines) ──"
              $COMPOSE logs api --tail 30 || true
              exit 1
            fi

            echo ""
            echo "✅ All containers started. SHA: $DEPLOY_SHA"
          ENDSSH

      # ── 5. Smoke test — wait up to 90 s for /health to return 200 ────────────
      - name: Smoke test API health
        id: smoke
        run: |
          echo "Waiting for service to become healthy (up to 150s)..."
          MAX_ATTEMPTS=30   # 30 × 5 s = 150 s
          ATTEMPT=0
          until curl -sf --max-time 8 "https://bmi-api-server.duckdns.org/health" \
                  | grep -q '"ok"'; do
            ATTEMPT=$((ATTEMPT + 1))
            if [ "$ATTEMPT" -ge "$MAX_ATTEMPTS" ]; then
              echo "FAIL: Health endpoint did not return 200/ok after 150s"
              exit 1
            fi
            echo "  Attempt $ATTEMPT/$MAX_ATTEMPTS — not ready, retrying in 5s..."
            sleep 5
          done
          echo "PASS: Health check succeeded after $((ATTEMPT * 5))s"

      # ── 6. Rollback on smoke-test failure ────────────────────────────────────
      - name: Rollback on failure
        if: failure() && steps.deploy.outcome == 'success' && steps.smoke.outcome == 'failure'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.SSH_DEPLOY_PATH }}
        run: |
          echo "Smoke test failed — rolling back to previous commit..."
          ssh "$SSH_USER@$SSH_HOST" bash -s "$DEPLOY_PATH" << 'ENDSSH'
            set -euo pipefail
            DEPLOY_PATH=$1
            COMPOSE="docker compose -f docker-compose.oracle.yml"
            cd "$DEPLOY_PATH"
            echo "==> Reverting to HEAD~1..."
            git reset --hard HEAD~1
            $COMPOSE down --remove-orphans --timeout 30 || true
            NODE_OPTIONS="--max-old-space-size=512" $COMPOSE build --no-cache api
            $COMPOSE up -d --no-build
            echo "==> Rollback complete"
          ENDSSH

      # ── 7. Final status message ───────────────────────────────────────────────
      - name: Report result
        if: always()
        run: |
          if [ "${{ steps.smoke.outcome }}" = "success" ]; then
            echo "✅ Deploy SUCCESS — SHA ${{ github.sha }} is live"
          else
            echo "❌ Deploy FAILED — rollback was triggered"
            exit 1
          fi
