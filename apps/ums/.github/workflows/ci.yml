name: CI 
on: 
  push: 
    branches: [main, develop] 
  pull_request: 
    branches: [main, develop] 
concurrency: 
  group: ${{ github.workflow }}-${{ github.ref }} 
  cancel-in-progress: true 
jobs: 
  frontend: 
    name: Frontend — type-check, lint, test, build 
    runs-on: ubuntu-latest 
    steps: 
      - uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: '24', cache: 'npm' } 
      - run: npm install --legacy-peer-deps 
      - run: npm run type-check 
      - run: npm run lint 
      - run: npm run test 
      - run: npm run build 
      - uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 
        with: { name: frontend-coverage, path: coverage/ } 

  backend: 
    name: Backend — lint, test, build 
    runs-on: ubuntu-latest 
    defaults: 
      run: 
        working-directory: backend 
    steps: 
      - uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: '24', cache: 'npm', cache-dependency-path: backend/package-lock.json } 
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build 

  docker: 
    name: Docker build and non-root verification 
    runs-on: ubuntu-latest 
    needs: [frontend, backend] 
    steps: 
      - uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 
      - name: Build API image
        run: docker compose -f docker-compose.yml build api
      - name: Verify API container runs as non-root 
        run: | 
          USER=$(docker compose -f docker-compose.yml run --rm --no-deps api whoami)
          echo "Detected user: $USER"
          [ "$USER" != "root" ] || (echo "FAIL: API running as root" && exit 1) 
          echo "PASS: API running as $USER" 
