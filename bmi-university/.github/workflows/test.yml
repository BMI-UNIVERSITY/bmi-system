name: Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Checkout shared package
      uses: actions/checkout@v4
      with:
        repository: BMI-UNIVERSITY/bmi-shared
        path: temp-shared
        
    - name: Move shared package to parent directory
      run: |
        mkdir -p ../packages
        mv temp-shared ../packages/bmi-shared
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install
      
    - name: Run Vitest unit tests
      run: npm run test
