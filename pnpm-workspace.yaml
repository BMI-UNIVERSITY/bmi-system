  - '@sentry/cloudflare@10.62.0'
  - '@sentry/core@10.62.0'
  - '@sentry/feedback@10.62.0'
  - '@sentry/react@10.62.0'
  - '@sentry/replay-canvas@10.62.0'
  - '@sentry/replay@10.62.0'
